name: scout

# 两种触发方式：
# 1. 推送修改 .scout-request（内容原样传给 polycopycat scout：
#    可以是地址列表，也可以是 --from-leaderboard --candidates 100 这类参数）
# 2. 在 Actions 页手动 Run workflow 并填参数
on:
  push:
    paths:
      - ".scout-request"
  workflow_dispatch:
    inputs:
      addresses:
        description: "scout 参数（地址或 --from-leaderboard 等）"
        required: true

permissions:
  contents: write

concurrency: scout

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装
        run: pip install -e .

      - name: 运行 scout
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REQUEST="${{ github.event.inputs.addresses }}"
          else
            REQUEST="$(tr '\n' ' ' < .scout-request)"
          fi
          echo "scout 参数: $REQUEST"
          mkdir -p scout-results
          polycopycat scout $REQUEST --pages 2 --json > scout-results/latest.json || true
          polycopycat scout $REQUEST --pages 2 --targets-snippet --top 10 \
            > scout-results/latest.txt 2>&1 || true
          tail -20 scout-results/latest.txt

      - name: 提交结果
        run: |
          git config user.name "scout-bot"
          git config user.email "actions@users.noreply.github.com"
          git add scout-results
          git commit -m "scout 评估结果 [skip ci]" || echo "结果无变化"
          git push
