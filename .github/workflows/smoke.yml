name: smoke

# 真实接口冒烟：把沙箱里连不上 Polymarket 而无法验证的面全部跑一遍。
# 触发：推送修改 .smoke-request，或 Actions 页手动 Run workflow。
on:
  push:
    paths:
      - ".smoke-request"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency: smoke

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装
        run: pip install -e .

      - name: 真实接口冒烟
        run: |
          set +e
          mkdir -p smoke-results
          SUMMARY=smoke-results/summary.txt
          : > $SUMMARY

          # 从全站成交流选当下最活跃的 3 个地址做试验对象
          ACTIVE=$(python3 - <<'PY'
          from collections import Counter
          from polycopycat import DataApiClient
          counter = Counter()
          for trade in DataApiClient().get_recent_trades(limit=500):
              counter[trade.proxy_wallet] += 1
          print(" ".join(wallet for wallet, _ in counter.most_common(3)))
          PY
          )
          echo "试验地址: $ACTIVE" | tee -a $SUMMARY
          A1=$(echo $ACTIVE | cut -d' ' -f1)

          echo "== T1 trades（真实 Data API 拉取）==" | tee -a $SUMMARY
          polycopycat trades $A1 --limit 5 > smoke-results/t1_trades.log 2>&1
          rc=$?; lines=$(grep -cE "^20[0-9]{2}-" smoke-results/t1_trades.log)
          [ $rc -eq 0 ] && [ $lines -ge 1 ] && verdict=PASS || verdict=FAIL
          echo "T1: exit=$rc 成交行数=$lines → $verdict" | tee -a $SUMMARY

          echo "== T2 watch --stream 90s（RTDS WebSocket 协议实测）==" | tee -a $SUMMARY
          timeout -s INT 90 polycopycat watch $ACTIVE --stream --backfill 1 -v \
            > smoke-results/t2_watch.log 2>&1
          rc=$?
          grep -q "实时成交流已连接" smoke-results/t2_watch.log && ws=OK || ws=FAIL
          grep -q "基线建立完成" smoke-results/t2_watch.log && base=OK || base=FAIL
          emitted=$(grep -cE "^20[0-9]{2}-" smoke-results/t2_watch.log)
          [ "$ws" = OK ] && [ "$base" = OK ] && verdict=PASS || verdict=FAIL
          echo "T2: exit=$rc WS连接=$ws 基线=$base 窗口内输出成交=$emitted 条 → $verdict" | tee -a $SUMMARY

          echo "== T3 CLOB 市场元数据 + 订单簿（引擎依赖的端点）==" | tee -a $SUMMARY
          python3 - > smoke-results/t3_clob.log 2>&1 <<'PY'
          from polycopycat import DataApiClient
          from polycopycat.engine.clob import ClobReadClient
          trade = DataApiClient().get_recent_trades(limit=1)[0]
          clob = ClobReadClient()
          market = clob.get_market(trade.condition_id)
          print(f"market: tick={market.tick_size} min={market.min_size} "
                f"negRisk={market.neg_risk} accepting={market.accepting_orders}")
          book = clob.get_book(trade.asset)
          print(f"book: bids={len(book.bids)} asks={len(book.asks)}")
          assert market.tick_size > 0 and market.min_size > 0
          print("PASS")
          PY
          grep -q "PASS" smoke-results/t3_clob.log && verdict=PASS || verdict=FAIL
          echo "T3: $(head -2 smoke-results/t3_clob.log | tr '\n' ' ') → $verdict" | tee -a $SUMMARY

          echo "== T4 纸面引擎真实全链路 150s + report ==" | tee -a $SUMMARY
          python3 - "$ACTIVE" <<'PY'
          import json, sys
          addrs = sys.argv[1].split()
          config = {
              "mode": "paper",
              "ledger_path": "smoke-results/smoke-ledger.sqlite3",
              "targets": [
                  {"address": a, "ratio": 0.05, "max_per_trade_usdc": 20}
                  for a in addrs
              ],
              "filters": {"min_target_notional_usdc": 1, "max_signal_age_s": 120},
              "risk": {
                  "max_market_exposure_usdc": 100,
                  "max_total_exposure_usdc": 300,
                  "daily_max_loss_usdc": 1000,
                  "kill_switch_file": "SMOKE_STOP",
              },
              "watch": {"stream": True, "poll_interval": 30, "backfill": 0},
          }
          json.dump(config, open("smoke-config.json", "w"))
          PY
          timeout -s INT 150 polycopycat run --config smoke-config.json \
            > smoke-results/t4_run.log 2>&1
          rc=$?
          grep -q "跟单引擎已启动" smoke-results/t4_run.log && eng=OK || eng=FAIL
          grep -q "镜像" smoke-results/t4_run.log && mirror=OK || mirror=FAIL
          polycopycat report --ledger smoke-results/smoke-ledger.sqlite3 \
            > smoke-results/t4_report.log 2>&1
          rrc=$?
          signals=$(grep -m1 "信号统计" smoke-results/t4_report.log)
          [ "$eng" = OK ] && [ $rrc -eq 0 ] && verdict=PASS || verdict=FAIL
          echo "T4: run_exit=$rc 引擎=$eng 镜像初始化=$mirror report_exit=$rrc → $verdict" | tee -a $SUMMARY
          echo "T4 $signals" | tee -a $SUMMARY

          echo "---- 汇总 ----"
          cat $SUMMARY

      - name: 提交结果
        run: |
          git config user.name "smoke-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f smoke-results/summary.txt smoke-results/*.log
          git commit -m "smoke 冒烟结果 [skip ci]" || { echo "结果无变化"; exit 0; }
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "推送被拒（并发结果提交），rebase 后重试 #$attempt"
            git pull --rebase origin ${GITHUB_REF_NAME}
          done
          git push
