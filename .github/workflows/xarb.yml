name: xarb-scan

# 触发：推送修改 .xarb-request（内容原样传给 polycopycat xarb-scan），
# 或 Actions 页手动 Run workflow
on:
  push:
    paths:
      - ".xarb-request"
  workflow_dispatch:
    inputs:
      args:
        description: "xarb-scan 参数（如 --suggest 或 --pairs xarb-pairs.json）"
        required: false
        default: "--suggest"

permissions:
  contents: write

concurrency: xarb-scan

jobs:
  xarb-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装
        run: pip install -e .

      - name: 运行 xarb-scan
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REQUEST="${{ github.event.inputs.args }}"
          else
            REQUEST="$(tr '\n' ' ' < .xarb-request)"
          fi
          echo "xarb-scan 参数: $REQUEST"
          mkdir -p xarb-results
          polycopycat xarb-scan $REQUEST --json > xarb-results/latest.json || true
          polycopycat xarb-scan $REQUEST > xarb-results/latest.txt 2>&1 || true
          tail -30 xarb-results/latest.txt

      - name: 提交结果
        run: |
          git config user.name "xarb-bot"
          git config user.email "actions@users.noreply.github.com"
          git add xarb-results
          git commit -m "xarb-scan 结果 [skip ci]" || echo "结果无变化"
          git push
